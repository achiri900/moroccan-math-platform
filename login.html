<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول</title>

  <style>
    body{
      font-family: Arial;
      background:#0f172a;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .login-box{
      background:white;
      padding:30px;
      border-radius:15px;
      width:320px;
    }

    h2{
      text-align:center;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:8px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      background:#2563eb;
      color:white;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:#1d4ed8;
    }

    #message{
      margin-top:15px;
      text-align:center;
      color:red;
    }
  </style>

</head>

<body>

<div class="login-box">

  <h2>تسجيل الدخول</h2>

  <input type="email" id="email" placeholder="البريد الإلكتروني">

  <input type="password" id="password" placeholder="كلمة المرور">

<button class="login-btn" onclick="login()">
  دخول
</button>

<button class="register-btn" onclick="register()" style="margin-top:10px;background:#16a34a;">
  إنشاء حساب
</button>

  <p id="message"></p>

</div>

<script type="module" src="auth.js"></script>

</body>
</html>
